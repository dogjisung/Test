<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏛️ 포미토이 미니 쿠지판</title>
    <style>
        /* 고급 경매장 VIP 다크 골드 테마 컬러 세팅 */
        :root {
            --bg-main: #0B0B0C;
            --bg-card: #161618;
            --color-gold: #E5BA6A;
            --color-platinum: #EAEAEA;
            --color-sub: #525256;
            --border-bronze: #4A3B2C;
        }

        body {
            background-color: var(--bg-main);
            color: var(--color-platinum);
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-text-size-adjust: none;
            text-size-adjust: none;
            
            /* 모바일 의도치 않은 텍스트 드래그 및 길게 누르기 방지 */
            -webkit-user-select: none;
            user-select: none;
        }

        /* 모든 뷰 화면들은 기본적으로 완전히 숨김 처리 */
        .view {
            display: none !important;
            width: 100%;
            max-width: 480px;
            flex-direction: column;
            align-items: center;
        }
        
        /* active 클래스가 붙은 단 하나의 화면만 화면에 표시 */
        .view.active {
            display: flex !important;
        }

        /* --- [메인 화면 타이틀 스타일] --- */
        .main-title-frame {
            text-align: center;
            margin: 60px 0 40px 0;
            width: 100%;
        }
        .main-title-icon {
            font-size: 32px;
            color: var(--color-gold);
            margin-bottom: 5px;
        }
        .main-title-text-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--color-gold);
            font-size: 32px;
            font-weight: bold;
            margin: 0;
        }
        .main-subtitle-text {
            font-size: 11px;
            font-style: italic;
            color: #B5A48B;
            margin-top: 10px;
        }

        /* --- [메인 메뉴 버튼 구조] --- */
        .menu-frame {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .menu-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-bronze);
            padding: 4px;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .menu-btn {
            width: 100%;
            background-color: var(--bg-card);
            color: var(--color-platinum);
            border: none;
            padding: 16px 0;
            font-size: 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            
            /* 아이폰 전용 터치 하이라이트 제거 및 더블탭 확대 방지 */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .menu-btn:active {
            background-color: var(--color-gold);
            color: #0B0B0C;
        }

        /* --- [설정 및 서브 화면 공통 서식] --- */
        .config-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--color-gold);
            margin: 40px 0 30px 0;
            text-align: center;
        }
        .config-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 40px;
        }
        .sub-config-view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-style {
            background-color: var(--bg-card);
            color: var(--color-platinum);
            border: 1px solid var(--color-gold);
            padding: 12px;
            font-size: 16px;
            text-align: center;
            border-radius: 4px;
            width: 60%;
            margin-bottom: 20px;
            box-sizing: border-box;
            -webkit-user-select: auto;
            user-select: auto; /* 인풋창은 터치 입력 가능하게 */
        }
        .scroll-container {
            width: 100%;
            max-height: 55vh;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .reward-row {
            background-color: var(--bg-card);
            border: 1px solid var(--border-bronze);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-sizing: border-box;
        }
        .reward-row label {
            color: var(--color-gold);
            font-size: 14px;
            font-weight: bold;
            min-width: 85px;
        }
        .reward-row input {
            flex: 1;
            background-color: var(--bg-main);
            color: var(--color-platinum);
            border: 1px solid var(--border-bronze);
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            -webkit-user-select: auto;
            user-select: auto;
        }

        /* --- [인게임 가챠판 화면 서식] --- */
        .game-title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--color-gold);
            font-size: 22px;
            font-weight: bold;
            margin-top: 25px;
            margin-bottom: 15px;
        }
        .grid-container {
            display: grid;
            gap: 6px;
            width: 100%;
            margin: auto 0;
            padding: 15px 0;
        }
        .grid-cols-5 { grid-template-columns: repeat(5, 1fr); }
        .grid-cols-10 { grid-template-columns: repeat(10, 1fr); }

        .box-btn {
            background-color: var(--bg-card);
            color: var(--color-gold);
            border: 1px solid #3A3A3C;
            border-radius: 4px;
            aspect-ratio: 1 / 1;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .grid-cols-5 .box-btn { font-size: 13px; }
        .grid-cols-10 .box-btn { font-size: 9px; padding: 2px; }

        .box-btn:active {
            background-color: var(--color-gold);
            color: #0B0B0C;
        }
        .box-btn.revealed {
            background-color: #222224;
            cursor: default;
        }
        .box-btn.revealed.ggwang {
            color: var(--color-sub);
            border-color: #3A3A3C;
        }
        .box-btn.revealed.win {
            color: var(--color-gold);
            border-color: var(--color-gold);
        }

        /* 하단 컨테이너 및 액션 버튼 디자인 */
        .bottom-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 25px;
        }
        .action-btn {
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .action-btn.gold { background-color: var(--color-gold); color: #0B0B0C; }
        .action-btn.gray { background-color: #2C2C2E; color: white; }
    </style>
</head>
<body>

    <!-- ==================== [1. 메인 메뉴 화면] ==================== -->
    <div id="viewMain" class="view active">
        <div class="main-title-frame">
            <div class="main-title-icon">🎫</div>
            <div class="main-title-text-container">
                <span>🏛️</span>
                <span>포미토이 미니 쿠지판</span>
                <span>🏛️</span>
            </div>
            <div class="main-subtitle-text">PRIVATE AUCTION GACHA WORLD</div>
        </div>
        <div class="menu-frame">
            <div class="menu-box"><button class="menu-btn" onclick="switchView('viewGame'); startGame();">새로운 쿠지판 시작 🎲</button></div>
            <div class="menu-box"><button class="menu-btn" onclick="triggerFileLoad()">이어서 하기 (불러오기) 📂</button></div>
            <!-- 숨겨진 파일 입력 태그 -->
            <input type="file" id="fileSelector" accept=".json" style="display: none;" onchange="loadGameFromFile(this)">

            <div class="menu-box"><button class="menu-btn" onclick="switchView('viewConfigMain')">쿠지판 설정 ⚙️</button></div>
            <div class="menu-box"><button class="menu-btn" onclick="resetSystem()">전체 초기화 🗑️</button></div>
        </div>
    </div>

    <!-- ==================== [2. 가챠 설정 메인 화면] ==================== -->
    <div id="viewConfigMain" class="view">
        <div class="config-title">⚙️ 가챠 판 커스텀 설정</div>
        <div class="config-list">
            <div class="menu-box"><button class="menu-btn" onclick="switchView('viewConfigCount')">1. 개수 설정</button></div>
            <div class="menu-box"><button class="menu-btn" onclick="switchView('viewConfigRank'); renderRankConfig();">2. 순위 설정</button></div>
            <div class="menu-box"><button class="menu-btn" onclick="switchView('viewConfigReward'); renderRewardConfig();">3. 보상 설정</button></div>
        </div>
        <button class="action-btn gray" onclick="switchView('viewMain')">← 메인으로</button>
    </div>

    <!-- 2-1. 개수 설정 화면 -->
    <div id="viewConfigCount" class="view sub-config-view">
        <div class="config-title">📦 총 박스 개수 설정</div>
        <input type="number" id="inputTotalCount" class="input-style" value="0">
        <button class="action-btn gold" style="width:60%; margin-bottom:15px;" onclick="saveTotalCount()">저장</button>
        <button class="action-btn gray" style="width:60%;" onclick="switchView('viewConfigMain')">취소</button>
    </div>

    <!-- 2-2. 순위 설정 화면 -->
    <div id="viewConfigRank" class="view sub-config-view">
        <div class="config-title">🏅 등수별 수량 설정</div>
        <div class="scroll-container" id="rankInputsContainer"></div>
        <button class="action-btn gold" style="margin-bottom:10px;" onclick="saveRankConfig()">저장</button>
        <button class="action-btn gray" onclick="switchView('viewConfigMain')">취소</button>
    </div>

    <!-- 2-3. 보상 설정 화면 -->
    <div id="viewConfigReward" class="view sub-config-view">
        <div class="config-title">🎁 등수별 상품 정보 명칭 설정</div>
        <div class="scroll-container" id="rewardInputsContainer"></div>
        <button class="action-btn gold" style="margin-bottom:10px;" onclick="saveRewardConfig()">저장</button>
        <button class="action-btn gray" onclick="switchView('viewConfigMain')">취소</button>
    </div>


    <!-- ==================== [3. 인게임 가챠판 화면] ==================== -->
    <div id="viewGame" class="view">
        <div class="game-title-container">
            <span>🏛️</span>
            <span>포미토이 미니 쿠지판</span>
            <span>🏛️</span>
        </div>

        <!-- 가챠 그리드 보드 -->
        <div class="grid-container" id="gachaBoard"></div>

        <!-- 하단 조작부 -->
        <div class="bottom-container">
            <button class="action-btn gold" onclick="playRandomGacha()">🎲 랜덤 가챠</button>
            <button class="action-btn gold" style="background-color: #4A3B2C; color: var(--color-gold); border: 1px solid var(--color-gold);" onclick="saveGameToFile()">💾 현재 상태 저장</button>
            <button class="action-btn gray" onclick="switchView('viewMain')">가챠판 나가기</button>
        </div>
    </div>

    <!-- ==================== [자바스크립트 내부 로직] ==================== -->
    <script>
        let totalCount = 0;
        let rankConfig = {};   
        let rewardConfig = {}; 
        let gameBoard = [];
        let revealedIndices = [];

        // 화면 뷰 전환 함수
        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => {
                v.classList.remove('active');
            });
            document.getElementById(viewId).classList.add('active');
            window.scrollTo(0, 0);
        }

        // 1. 개수 설정 저장
        function saveTotalCount() {
            const val = parseInt(document.getElementById('inputTotalCount').value) || 0;
            totalCount = val;
            switchView('viewConfigMain');
        }

        // 2. 순위 설정 UI 렌더러 및 저장
        function renderRankConfig() {
            const container = document.getElementById('rankInputsContainer');
            container.innerHTML = "";
            for(let i=1; i<=10; i++) {
                const currentVal = rankConfig[i] || 0;
                const row = document.createElement('div');
                row.className = 'reward-row';
                row.innerHTML = `
                    <label>🏅 ${i}등 개수:</label>
                    <input type="number" id="rankInput_${i}" value="${currentVal}" style="text-align:center;">
                `;
                container.appendChild(row);
            }
        }
        function saveRankConfig() {
            rankConfig = {};
            for(let i=1; i<=10; i++) {
                const val = parseInt(document.getElementById(`rankInput_${i}`).value) || 0;
                if(val > 0) rankConfig[i] = val;
            }
            switchView('viewConfigMain');
        }

        // 3. 보상 텍스트 입력창 UI 렌더러 및 저장
        function renderRewardConfig() {
            const container = document.getElementById('rewardInputsContainer');
            container.innerHTML = "";

            const activeRanks = Object.keys(rankConfig).sort((a,b)=>a-b);
            if(activeRanks.length === 0) {
                container.innerHTML = "<div style='text-align:center; padding:30px; color:#525256;'>설정된 등수가 없습니다. '순위 설정'을 먼저 해주세요.</div>";
                return;
            }

            activeRanks.forEach(rank => {
                const textVal = rewardConfig[rank]?.text || "";
                const row = document.createElement('div');
                row.className = 'reward-row';
                row.innerHTML = `
                    <label>🏅 ${rank}등 상품명:</label>
                    <input type="text" id="rewardText_${rank}" value="${textVal}" placeholder="예: 피규어 A상">
                `;
                container.appendChild(row);
            });
        }
        function saveRewardConfig() {
            const activeRanks = Object.keys(rankConfig);
            activeRanks.forEach(rank => {
                const text = document.getElementById(`rewardText_${rank}`).value;
                rewardConfig[rank] = { text };
            });
            switchView('viewConfigMain');
        }

        // 전체 초기화 핸들러
        function resetSystem() {
            if(confirm("모든 설정과 게임 데이터를 초기화할까요?")) {
                totalCount = 0;
                rankConfig = {};
                rewardConfig = {};
                gameBoard = [];
                revealedIndices = [];
                document.getElementById('inputTotalCount').value = 0;
                switchView('viewMain');
                alert("초기화가 완료되었습니다.");
            }
        }

        // 파일로 내보내기 다운로드 함수
        function saveGameToFile() {
            if (gameBoard.length === 0) {
                alert("저장할 쿠지판 게임 데이터가 없습니다.");
                return;
            }
            const saveData = {
                totalCount: totalCount,
                rankConfig: rankConfig,
                rewardConfig: rewardConfig,
                gameBoard: gameBoard,
                revealedIndices: revealedIndices
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(saveData, null, 2));
            const downloadAnchor = document.createElement('a');
            
            const now = new Date();
            const dateStr = `${now.getMonth()+1}월${now.getDate()}일_${now.getHours()}시${now.getMinutes()}분`;
            
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `포미토이_쿠지백업_${dateStr}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        // 불러오기 버튼 누를 때 파일 탐색기 창 열기
        function triggerFileLoad() {
            document.getElementById('fileSelector').click();
        }

        // 파일을 읽어와서 게임 복구하는 함수
        function loadGameFromFile(inputElement) {
            const file = inputElement.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const saveData = JSON.parse(e.target.result);
                    
                    totalCount = saveData.totalCount;
                    rankConfig = saveData.rankConfig;
                    rewardConfig = saveData.rewardConfig;
                    gameBoard = saveData.gameBoard;
                    revealedIndices = saveData.revealedIndices;

                    document.getElementById('inputTotalCount').value = totalCount;
                    inputElement.value = '';

                    switchView('viewGame');
                    renderBoard();
                    alert("📂 쿠지판 파일 기록을 성공적으로 불러와 이어서 시작합니다!");
                } catch (err) {
                    alert("❌ 올바른 쿠지판 저장 파일(.json)이 아니거나 파일이 손상되었습니다.");
                }
            };
            reader.readAsText(file);
        }

        // 쿠지 게임 시작 및 셔플
        function startGame() {
            if (totalCount === 0) {
                alert("설정을 먼저 완료해주세요.");
                switchView('viewMain');
                return;
            }
            if (gameBoard.length === 0) {
                buildNewBoard();
            }
            renderBoard();
        }

        function buildNewBoard() {
            gameBoard = Array(totalCount).fill("꽝");
            let idx = 0;
            Object.keys(rankConfig).sort((a,b)=>a-b).forEach(rank => {
                const qty = rankConfig[rank];
                for(let i=0; i<qty; i++) {
                    if(idx < totalCount) {
                        gameBoard[idx] = rank;
                        idx++;
                    }
                }
            });
            gameBoard.sort(() => Math.random() - 0.5);
            revealedIndices = [];
        }

        function renderBoard() {
            const boardEl = document.getElementById("gachaBoard");
            boardEl.innerHTML = "";

            const cols = totalCount >= 50 ? 10 : 5;
            boardEl.className = cols === 10 ? "grid-container grid-cols-10" : "grid-container grid-cols-5";

            for(let i=0; i<totalCount; i++) {
                const btn = document.createElement("button");
                
                if (revealedIndices.includes(i)) {
                    const rank = gameBoard[i];
                    if (rank === "꽝") {
                        btn.className = "box-btn revealed ggwang";
                        btn.innerHTML = "꽝";
                    } else {
                        btn.className = "box-btn revealed win";
                        btn.innerHTML = cols === 10 ? `🏆<br>${rank}등` : `🏆 ${rank}등`;
                    }
                } else {
                    btn.className = "box-btn";
                    btn.innerHTML = `🏷️<br>${i + 1}`;
                    btn.onclick = () => revealBox(i);
                }
                boardEl.appendChild(btn);
            }
        }

        function revealBox(idx) {
            if (revealedIndices.includes(idx)) return;
            revealedIndices.push(idx);
            renderBoard();

            setTimeout(() => {
                const rank = gameBoard[idx];
                if (rank === "꽝") {
                    alert(`💨 아쉽습니다!\n${idx + 1}번은 꽝입니다.`);
                } else {
                    const info = rewardConfig[rank] || { text: "보상 정보 없음" };
                    alert(`🎉 CONGRATULATIONS!\n\n${rank}등 낙찰! [${info.text}]`);
                }
            }, 100);
        }

        function playRandomGacha() {
            let unopened = [];
            for(let i=0; i<totalCount; i++) {
                if(!revealedIndices.includes(i)) unopened.push(i);
            }
            
            if(unopened.length === 0) {
                alert("모든 뽑기가 완료되었습니다!");
                return;
            }

            let blanks = unopened.filter(i => gameBoard[i] === "꽝");
            let rewards = unopened.filter(i => gameBoard[i] !== "꽝");
            
            let chosen;
            if(blanks.length > 0 && rewards.length > 0 && Math.random() < 0.92) {
                chosen = blanks[Math.floor(Math.random() * blanks.length)];
            } else {
                chosen = unopened[Math.floor(Math.random() * unopened.length)];
            }

            revealBox(chosen);
        }

        // --- [아이폰/모바일용 표준 터치 리스너 일괄 바인딩 기법] ---
        // 하드웨어 레벨에서 클릭 딜레이를 0으로 만들고 중복 실행을 완벽하게 방지합니다.
        document.addEventListener('click', function(e) {
            // 클릭된 대상이 버튼이거나 버튼의 자식 요소(텍스트/이모지)인 경우 처리
            const btn = e.target.closest('button, .box-btn');
            if (btn && btn.onclick) {
                // 인게임 가챠판의 일반 개별 박스 뽑기가 아닌 메뉴 버튼들 전용 처리
                if (!btn.classList.contains('box-btn')) {
                    e.preventDefault();
                    btn.onclick();
                }
            }
        }, { passive: false });
    </script>
</body>
</html>
